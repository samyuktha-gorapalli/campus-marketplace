<!DOCTYPE html>
<html>
<head>
    <title>Chat - Campus Marketplace</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
</head>
<body>
    <nav>
        <h1>Campus Marketplace</h1>
        <div class="nav-right">
            <a href="/inbox">← Inbox</a>
            <a href="/logout" class="logout">Logout</a>
        </div>
    </nav>
    <main>
        <div class="chat-container">
            <div class="chat-header">
                <h2>{{ other_user }}</h2>
                {% if listing %}
                <p class="chat-listing">Re: {{ listing['title'] }} — ₹{{ listing['price'] }}</p>
                {% endif %}
            </div>
            <div class="chat-messages" id="messages">
                {% for msg in messages %}
                <div class="msg {% if msg['sender'] == user %}msg-mine{% else %}msg-theirs{% endif %}">
                    <p>{{ msg['message'] }}</p>
                    <span class="msg-time">{{ msg['created_at'] }}</span>
                </div>
                {% endfor %}
            </div>
            <div class="chat-input">
                <input type="text" id="msgInput" placeholder="Type a message..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </main>
    <script>
        const socket = io();
        const chatId = {{ chat.id }};
        const user = "{{ user }}";

        socket.emit('join', { room: String(chatId) });

        socket.on('message', function(data) {
            appendMessage(data.sender, data.message, data.sender === user);
        });

        function appendMessage(sender, message, isMine) {
            const div = document.createElement('div');
            div.className = 'msg ' + (isMine ? 'msg-mine' : 'msg-theirs');
            div.innerHTML = '<p>' + message + '</p>';
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        function sendMessage() {
            const input = document.getElementById('msgInput');
            const message = input.value.trim();
            if (!message) return;
            socket.emit('message', { chat_id: chatId, sender: user, message: message });
            input.value = '';
        }

        document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    </script>
</body>
</html>
