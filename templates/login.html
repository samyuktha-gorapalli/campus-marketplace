<!DOCTYPE html>
<html>
<head>
    <title>Login - Campus Marketplace</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <nav><h1>Campus Marketplace</h1></nav>
    <main>
        <div class="form-container">
            <h2>Login</h2>
            <p class="subtitle">Use your college email to login</p>
            <div id="error" class="error-msg" style="display:none"></div>
            <div class="form-group">
                <label>College Email</label>
                <input type="email" id="email" placeholder="you@university.ac.in">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••">
            </div>
            <button onclick="submitLogin()">Login</button>
            <p class="switch">Don't have an account? <a href="/signup">Sign up</a></p>
        </div>
    </main>
    <script>
        async function submitLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (res.ok) {
                window.location.href = '/';
            } else {
                document.getElementById('error').style.display = 'block';
                document.getElementById('error').textContent = data.error;
            }
        }
    </script>
</body>
</html>
